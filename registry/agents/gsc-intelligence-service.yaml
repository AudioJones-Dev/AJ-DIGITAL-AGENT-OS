schema_version: "0.1"
agent_id: gsc-intelligence-service
name: GSC Intelligence Service
status: planned
purpose: Tenant-aware Google Search Console data service with MCP, reporting, and alerting interfaces
local_path: "C:\\dev\\aj-gsc-intelligence-service"
product_url: "https://seo.ajdigital.app"
domain:
  product_subdomain: seo.ajdigital.app
  tenant_pattern: "{clientname}.seo.ajdigital.app"
ownership:
  product_code_owner: GSC Intelligence Service workspace
  orchestration_owner: AJ Digital Agent OS
boundaries:
  product_code_location: "C:\\dev\\aj-gsc-intelligence-service"
  agent_os_may:
    - reference the service in registry and orchestration documentation
    - document approval gates
    - document domain and tenant routing assumptions
    - route approved agent workflows to the service after setup is verified
  agent_os_must_not:
    - modify runtime service code without explicit approval
    - create OAuth clients without explicit approval
    - create databases or run migrations without explicit approval
    - read or expose secrets
    - change deployments, domains, or environment variables without explicit approval
approval_gates:
  - delete
  - rename
  - move
  - overwrite
  - install_dependencies
  - credential_changes
  - project_setting_changes
  - run_migrations
  - deployments
  - push_to_remote
  - change_env_variables
  - modify_secrets
  - modify_active_app_code
  - change_deployment_settings
integrations:
  required:
    - google_search_console
    - google_oauth
    - postgres
    - mcp
  planned:
    - cloud_run
    - neon
    - n8n
    - cloudflare_r2
    - slack
    - posthog
notes:
  - Runtime implementation is planned for a separate service repo, not audiojones-clean.
  - audiojones.com remains a public brand and onboarding surface.
  - The first pilot property should be AudioJones-owned Google Search Console data.
  - Indexing API is out of scope for v1 unless the target page type is officially supported by Google.
